site_name: meaorganoid
site_description: CSV-first Axion MEA analysis toolkit for brain organoids.
repo_url: https://github.com/zdx8910/axion-organoid-pipeline
docs_dir: docs
site_dir: site
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
nav:
  - Home: index.md
  - Quickstart: tutorials/quickstart.md
  - Workflows:
      - A - Ingestion: tutorials/workflow-a-ingestion.md
      - B - Burst Detection: tutorials/workflow-b-bursts.md
      - C - Baseline Normalization: tutorials/workflow-c-baseline.md
      - D - Raster Plot: tutorials/workflow-d-raster.md
      - E - Spatial Heatmap: tutorials/workflow-e-spatial.md
      - F - Group Comparison: tutorials/workflow-f-group.md
      - G - Connectivity: tutorials/workflow-g-connectivity.md
      - H - QC Report: tutorials/workflow-h-qc.md
  - Methodology: methodology.md
  - CLI Reference: cli.md
  - API Reference: api.md
  - Contributing:
      - Release Process: contributing/release-process.md
  - Task Plans:
      - Overview: tasks/README.md
      - Task 01 - Bootstrap: tasks/codex_task_01_bootstrap.md
      - Task 02 - Workflow A: tasks/codex_task_02_workflow_a_ingestion.md
      - Task 03 - Workflow H: tasks/codex_task_03_workflow_h_qc.md
      - Task 04 - Workflow B: tasks/codex_task_04_workflow_b_bursts.md
      - Task 05 - Workflow C: tasks/codex_task_05_workflow_c_baseline.md
      - Task 06 - Workflow D: tasks/codex_task_06_workflow_d_raster.md
      - Task 07 - Workflow E: tasks/codex_task_07_workflow_e_spatial.md
      - Task 08 - Workflow F: tasks/codex_task_08_workflow_f_group.md
      - Task 09 - Workflow G: tasks/codex_task_09_workflow_g_connectivity.md
      - Task 10 - Docs Site: tasks/codex_task_10_docs_site.md
      - Task 11 - CI Release: tasks/codex_task_11_ci_release.md
  - Changelog: changelog.md
  - Citation: citation.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: numpy
            show_source: false
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
